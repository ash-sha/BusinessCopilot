<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-label="Domain pack architecture for the Enterprise AI Decision Intelligence Copilot">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <linearGradient id="bg3" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <style>
      .title { font: 700 26px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 14px Arial, sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 16; ry: 16; }
      .pill { fill: #e2e8f0; stroke: #cbd5e1; stroke-width: 1; rx: 999; ry: 999; }
      .label { font: 700 16px Arial, sans-serif; fill: #0f172a; }
      .body { font: 400 13px Arial, sans-serif; fill: #1e293b; }
      .small { font: 400 12px Arial, sans-serif; fill: #475569; }
      .line { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1400" height="520" fill="url(#bg3)"/>

  <text x="700" y="42" text-anchor="middle" class="title">Domain Pack Architecture</text>
  <text x="700" y="66" text-anchor="middle" class="subtitle">Each business domain is configured through reusable schemas, metrics, tasks, and rules</text>

  <rect x="60" y="160" width="240" height="180" class="box" fill="#dbeafe"/>
  <rect x="60" y="160" width="240" height="36" class="pill"/>
  <text x="180" y="184" text-anchor="middle" class="label">Domain Pack</text>
  <text x="90" y="226" class="body">Domain name</text>
  <text x="90" y="250" class="body">Entity definitions</text>
  <text x="90" y="274" class="body">Schema expectations</text>
  <text x="90" y="298" class="body">Metrics and KPIs</text>
  <text x="90" y="322" class="body">Prompt templates</text>

  <rect x="370" y="110" width="235" height="110" class="box" fill="#ede9fe"/>
  <rect x="370" y="110" width="235" height="30" class="pill"/>
  <text x="487" y="131" text-anchor="middle" class="label">Schemas</text>
  <text x="395" y="164" class="small">Required tables</text>
  <text x="395" y="184" class="small">Column names and types</text>

  <rect x="370" y="240" width="235" height="110" class="box" fill="#ecfeff"/>
  <rect x="370" y="240" width="235" height="30" class="pill"/>
  <text x="487" y="261" text-anchor="middle" class="label">Metrics</text>
  <text x="395" y="294" class="small">KPI definitions</text>
  <text x="395" y="314" class="small">Aggregations and grains</text>

  <rect x="670" y="110" width="235" height="110" class="box" fill="#f0fdf4"/>
  <rect x="670" y="110" width="235" height="30" class="pill"/>
  <text x="787" y="131" text-anchor="middle" class="label">ML Tasks</text>
  <text x="695" y="164" class="small">Classification</text>
  <text x="695" y="184" class="small">Regression and forecasting</text>

  <rect x="670" y="240" width="235" height="110" class="box" fill="#fff7ed"/>
  <rect x="670" y="240" width="235" height="30" class="pill"/>
  <text x="787" y="261" text-anchor="middle" class="label">Dashboards</text>
  <text x="695" y="294" class="small">Metric views</text>
  <text x="695" y="314" class="small">Charts and filters</text>

  <rect x="970" y="110" width="235" height="110" class="box" fill="#fdf2f8"/>
  <rect x="970" y="110" width="235" height="30" class="pill"/>
  <text x="1087" y="131" text-anchor="middle" class="label">Prompts</text>
  <text x="995" y="164" class="small">Instruction templates</text>
  <text x="995" y="184" class="small">Tool routing hints</text>

  <rect x="970" y="240" width="235" height="110" class="box" fill="#f8fafc"/>
  <rect x="970" y="240" width="235" height="30" class="pill"/>
  <text x="1087" y="261" text-anchor="middle" class="label">Evaluation Rules</text>
  <text x="995" y="294" class="small">Quality thresholds</text>
  <text x="995" y="314" class="small">Safety checks</text>

  <line x1="300" y1="250" x2="370" y2="165" class="line"/>
  <line x1="300" y1="250" x2="370" y2="295" class="line"/>
  <line x1="300" y1="250" x2="670" y2="165" class="line"/>
  <line x1="300" y1="250" x2="670" y2="295" class="line"/>
  <line x1="300" y1="250" x2="970" y2="165" class="line"/>
  <line x1="300" y1="250" x2="970" y2="295" class="line"/>

  <text x="700" y="438" text-anchor="middle" class="subtitle">Domain packs let one platform support healthcare, BFSI, retail, and marketing without hardcoding business logic.</text>
</svg>
