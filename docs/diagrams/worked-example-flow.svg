<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="420" viewBox="0 0 1800 420" role="img" aria-label="End to end worked example flow">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 16; ry: 16; }
      .box2 { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 2; rx: 16; ry: 16; }
      .box3 { fill: #ecfeff; stroke: #0f766e; stroke-width: 2; rx: 16; ry: 16; }
      .label { font: 600 18px Arial, sans-serif; fill: #0f172a; }
      .sub { font: 13px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #334155; stroke-width: 4; fill: none; marker-end: url(#arrowHead); }
    </style>
    <marker id="arrowHead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#334155"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1800" height="420"/>

  <rect class="box" x="30" y="140" width="200" height="120"/>
  <text class="label" x="130" y="176" text-anchor="middle">Raw CSV</text>
  <text class="sub" x="130" y="202" text-anchor="middle">orders, customers, docs</text>

  <rect class="box" x="260" y="140" width="200" height="120"/>
  <text class="label" x="360" y="176" text-anchor="middle">Validate</text>
  <text class="sub" x="360" y="202" text-anchor="middle">schema, nulls, ranges</text>

  <rect class="box2" x="490" y="140" width="220" height="120"/>
  <text class="label" x="600" y="176" text-anchor="middle">PostgreSQL + dbt</text>
  <text class="sub" x="600" y="202" text-anchor="middle">warehouse, marts, metrics</text>

  <rect class="box" x="740" y="140" width="200" height="120"/>
  <text class="label" x="840" y="176" text-anchor="middle">Dashboard</text>
  <text class="sub" x="840" y="202" text-anchor="middle">KPI, cohort, funnel</text>

  <rect class="box3" x="970" y="140" width="200" height="120"/>
  <text class="label" x="1070" y="176" text-anchor="middle">Train Model</text>
  <text class="sub" x="1070" y="202" text-anchor="middle">churn, forecast, risk</text>

  <rect class="box3" x="1200" y="140" width="200" height="120"/>
  <text class="label" x="1300" y="176" text-anchor="middle">RAG Docs</text>
  <text class="sub" x="1300" y="202" text-anchor="middle">policy, product, FAQ</text>

  <rect class="box2" x="1430" y="140" width="190" height="120"/>
  <text class="label" x="1525" y="176" text-anchor="middle">Agent Router</text>
  <text class="sub" x="1525" y="202" text-anchor="middle">SQL, ML, RAG, charts</text>

  <rect class="box" x="1640" y="140" width="130" height="120"/>
  <text class="label" x="1705" y="176" text-anchor="middle">Deploy</text>
  <text class="sub" x="1705" y="202" text-anchor="middle">Docker / Azure</text>

  <path class="arrow" d="M230 200 L260 200"/>
  <path class="arrow" d="M460 200 L490 200"/>
  <path class="arrow" d="M710 200 L740 200"/>
  <path class="arrow" d="M940 200 L970 200"/>
  <path class="arrow" d="M1170 200 L1200 200"/>
  <path class="arrow" d="M1400 200 L1430 200"/>
  <path class="arrow" d="M1620 200 L1640 200"/>
</svg>
